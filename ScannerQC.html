<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TranZact QC Scanner</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { font-family: 'Google Sans', Arial, sans-serif; padding: 20px; background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); margin: 0; }
    .container { max-width: 550px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
    h2 { color: #11998e; margin-top: 0; text-align: center; font-size: 24px; }
    #reader { width: 100%; border-radius: 8px; margin-bottom: 20px; overflow: hidden; border: 3px solid #11998e; }
    input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
    .btn-lookup { background: #11998e; color: white; border: none; cursor: pointer; font-weight: bold; }
    .btn-row { display: flex; gap: 10px; margin-top: 8px; }
    .btn-pass { flex: 1; background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; border: none; cursor: pointer; font-weight: bold; padding: 14px; border-radius: 6px; font-size: 16px; }
    .btn-fail { flex: 1; background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%); color: white; border: none; cursor: pointer; font-weight: bold; padding: 14px; border-radius: 6px; font-size: 16px; }
    button:disabled { background: #ccc !important; cursor: not-allowed; }
    .form-group { margin: 15px 0; }
    label { display: block; margin-bottom: 5px; color: #333; font-weight: 500; }
    .status { padding: 15px; border-radius: 6px; margin-top: 15px; text-align: center; font-weight: 500; display: none; }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .info    { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    #pendingInfo { background: #f0fff4; padding: 12px; border-radius: 6px; margin: 10px 0; display: none; border: 1px solid #c3e6cb; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #11998e; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; display: none; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h2>🔬 QC Inspection Scanner</h2>

    <div id="reader"></div>

    <div class="form-group">
      <label><b>Item ID</b> <span style="font-weight:normal;color:#888">(auto-filled on scan, or type manually)</span></label>
      <input type="text" id="itemId" placeholder="Scan QR or type Item ID">
      <button class="btn-lookup" onclick="lookupPending()">Look Up Pending Inward</button>
    </div>

    <div id="pendingInfo">
      <strong>Pending Inward Found:</strong><br>
      <span id="pendingDetails"></span>
    </div>

    <div class="form-group">
      <label><b>Accepted Quantity</b> <span style="font-weight:normal;color:#888">(edit if partial acceptance)</span></label>
      <input type="number" id="acceptedQty" min="0" step="any" placeholder="0">
    </div>

    <div class="form-group">
      <label><b>Bin / Storage Location</b> <span style="font-weight:normal;color:#888">(optional)</span></label>
      <input type="text" id="binLocation" placeholder="e.g. Rack A-3, Shelf 2">
    </div>

    <div class="btn-row">
      <button class="btn-pass" id="passBtn" onclick="submitQC('PASS')" disabled>✓ QC Pass</button>
      <button class="btn-fail" id="failBtn" onclick="submitQC('FAIL')" disabled>✗ QC Fail</button>
    </div>

    <div class="loader" id="loader"></div>
    <div id="statusMessage" class="status"></div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzWhddIl4BxxDu3WHHSxICC_22KQQjr5ZiY7R6wvzcjhS9mKL1PdaXR5Z-NjCXm3qOlKA/exec';

    let html5QrCode;
    let lastScannedCode = '';

    function callAPI(params) {
      const url = new URL(SCRIPT_URL);
      Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, String(v)));
      return fetch(url.toString()).then(r => r.json());
    }

    function onScanSuccess(decodedText) {
      if (decodedText !== lastScannedCode) {
        lastScannedCode = decodedText;
        document.getElementById('itemId').value = decodedText;
        html5QrCode.stop().catch(() => {});
        lookupPending();
      }
    }

    function lookupPending() {
      const itemId = document.getElementById('itemId').value.trim();
      if (!itemId) { showStatus('Enter or scan an Item ID first', 'error'); return; }
      showStatus('Looking up pending inward...', 'info');
      callAPI({ action: 'getPendingInward', itemId }).then(onPendingLookup).catch(onError);
    }

    function onPendingLookup(result) {
      if (result.success) {
        document.getElementById('pendingDetails').innerHTML =
          `<strong>${result.itemName}</strong><br>` +
          `Item ID: ${result.itemId}<br>` +
          `Received Qty: <strong>${result.receivedQty}</strong><br>` +
          `Challan: ${result.challan}<br>` +
          `PO: ${result.po || 'N/A'}<br>` +
          `Received at: ${result.timestamp}`;
        document.getElementById('pendingInfo').style.display = 'block';
        document.getElementById('acceptedQty').value = result.receivedQty;
        document.getElementById('passBtn').disabled = false;
        document.getElementById('failBtn').disabled = false;
        showStatus('Pending inward found. Inspect goods and record outcome below.', 'info');
      } else {
        showStatus('⚠ ' + result.error, 'error');
        document.getElementById('pendingInfo').style.display = 'none';
        document.getElementById('passBtn').disabled = true;
        document.getElementById('failBtn').disabled = true;
      }
    }

    function submitQC(result) {
      const itemId      = document.getElementById('itemId').value.trim();
      const acceptedQty = document.getElementById('acceptedQty').value;
      const binLocation = document.getElementById('binLocation').value.trim();

      if (result === 'PASS' && (!acceptedQty || parseFloat(acceptedQty) <= 0)) {
        showStatus('⚠ Enter accepted quantity', 'error'); return;
      }


      document.getElementById('passBtn').disabled = true;
      document.getElementById('failBtn').disabled = true;
      document.getElementById('loader').style.display = 'block';
      showStatus('Processing QC decision...', 'info');

      callAPI({ action: 'processQCApproval', itemId, acceptedQty, qcResult: result, binLocation })
        .then(onQCSubmit).catch(onError);
    }

    function onQCSubmit(result) {
      document.getElementById('loader').style.display = 'none';
      if (result.success) {
        showStatus(
          result.dryRun ? '✓ DRY RUN: ' + result.message : '✓ ' + result.message,
          result.dryRun ? 'info' : 'success'
        );
        setTimeout(resetForm, 3000);
      } else {
        showStatus('✗ ERROR: ' + result.error, 'error');
        document.getElementById('passBtn').disabled = false;
        document.getElementById('failBtn').disabled = false;
      }
    }

    function onError(err) {
      document.getElementById('loader').style.display = 'none';
      showStatus('✗ ERROR: ' + (err.message || err), 'error');
      document.getElementById('passBtn').disabled = false;
      document.getElementById('failBtn').disabled = false;
    }

    function resetForm() {
      document.getElementById('itemId').value = '';
      document.getElementById('acceptedQty').value = '';
      document.getElementById('binLocation').value = '';
      document.getElementById('pendingInfo').style.display = 'none';
      document.getElementById('passBtn').disabled = true;
      document.getElementById('failBtn').disabled = true;
      lastScannedCode = '';
      startScanner();
    }

    function showStatus(message, type) {
      const s = document.getElementById('statusMessage');
      s.className = 'status ' + type;
      s.innerHTML = message;
      s.style.display = 'block';
    }

    function startScanner() {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(function(stream) {
          stream.getTracks().forEach(t => t.stop());
          html5QrCode = new Html5Qrcode("reader");
          html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 250, height: 250 } },
            onScanSuccess
          ).catch(err => showStatus('Camera error: ' + err, 'error'));
        })
        .catch(function() {
          showStatus('📷 Camera permission denied. Please allow camera access in your browser settings and refresh.', 'error');
        });
    }

    window.onload = function() {
      const params = new URLSearchParams(window.location.search);
      const prefilledId = params.get('itemId');
      if (prefilledId) {
        document.getElementById('itemId').value = prefilledId;
        lookupPending();
      } else {
        startScanner();
      }
    };
  </script>
</body>
</html>
