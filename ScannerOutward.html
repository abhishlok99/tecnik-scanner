<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TranZact Outward Scanner</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { font-family: 'Google Sans', Arial, sans-serif; padding: 20px; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); margin: 0; }
    .container { max-width: 550px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
    h2 { color: #d32f2f; margin-top: 0; text-align: center; font-size: 24px; }
    #reader { width: 100%; border-radius: 8px; margin-bottom: 20px; overflow: hidden; border: 3px solid #d32f2f; }
    input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
    button { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border: none; cursor: pointer; font-weight: bold; transition: transform 0.2s; }
    button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(245,87,108,0.4); }
    button:disabled { background: #ccc; cursor: not-allowed; transform: none; }
    .form-group { margin: 15px 0; }
    label { display: block; margin-bottom: 5px; color: #333; font-weight: 500; }
    .status { padding: 15px; border-radius: 6px; margin-top: 15px; text-align: center; font-weight: 500; display: none; }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .info { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
    #itemInfo { background: #f8f9fa; padding: 12px; border-radius: 6px; margin: 10px 0; display: none; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #f5576c; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; display: none; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h2>📤 TranZact Outward Scanner</h2>

    <div id="reader"></div>

    <div class="form-group">
      <label><b>Scanned QR Code</b></label>
      <input type="text" id="qrCode" readonly style="background: #e9ecef;">
    </div>

    <div id="itemInfo">
      <strong>Item Found:</strong><br>
      <span id="itemDetails"></span>
    </div>

    <div class="form-group">
      <label><b>Quantity</b></label>
      <input type="number" id="qty" value="1" min="1" required>
    </div>

    <div class="form-group">
      <label><b>Issue To (Person/Dept)</b></label>
      <input type="text" id="issueTo" placeholder="Enter name or department" required>
    </div>

    <div class="form-group">
      <label><b>Purpose</b></label>
      <input type="text" id="purpose" placeholder="e.g., Production, Maintenance, Testing">
    </div>

    <button id="submitBtn" onclick="submitOutward()" disabled>Submit Outward</button>

    <div class="loader" id="loader"></div>
    <div id="statusMessage" class="status"></div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby6UCN_hImvz0uIev6vPvLi52cRMJzh7d5GJllWXj9GF7jOV1tuLtDmjbAdRlkwvaLFiw/exec';

    let html5QrCode;
    let lastScannedCode = '';

    function callAPI(params) {
      const url = new URL(SCRIPT_URL);
      Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, String(v)));
      return fetch(url.toString()).then(r => r.json());
    }

    function onScanSuccess(decodedText) {
      if (decodedText !== lastScannedCode) {
        lastScannedCode = decodedText;
        document.getElementById('qrCode').value = decodedText;
        showStatus('Looking up item...', 'info');
        callAPI({ action: 'lookupItem', qrCode: decodedText }).then(onItemLookup).catch(onError);
        html5QrCode.stop().catch(() => {});
      }
    }

    function onItemLookup(result) {
      if (result.success) {
        const item = result.item;
        document.getElementById('itemDetails').innerHTML =
          `<strong>${item.itemName}</strong><br>` +
          `ID: ${item.itemId}<br>` +
          `UOM: ${item.uom}<br>` +
          `Type: ${item.itemType}`;
        document.getElementById('itemInfo').style.display = 'block';
        document.getElementById('submitBtn').disabled = false;
        showStatus('✓ Item found! Enter details and submit.', 'success');
      } else {
        showStatus('⚠ ' + result.error, 'error');
        document.getElementById('submitBtn').disabled = true;
      }
    }

    function submitOutward() {
      const qrCode  = document.getElementById('qrCode').value;
      const qty     = parseFloat(document.getElementById('qty').value);
      const issueTo = document.getElementById('issueTo').value;
      const purpose = document.getElementById('purpose').value;

      if (!qrCode)                        { showStatus('⚠ Please scan a QR code first', 'error'); return; }
      if (!qty || qty <= 0)               { showStatus('⚠ Please enter a valid quantity', 'error'); return; }
      if (!issueTo || !issueTo.trim())    { showStatus('⚠ Please enter Issue To field', 'error'); return; }

      document.getElementById('submitBtn').disabled = true;
      document.getElementById('loader').style.display = 'block';
      showStatus('Processing outward...', 'info');

      callAPI({ action: 'processOutward', qrCode, quantity: qty, issueTo, purpose })
        .then(onOutwardSuccess).catch(onError);
    }

    function onOutwardSuccess(result) {
      document.getElementById('loader').style.display = 'none';
      if (result.success) {
        showStatus(result.dryRun ? '✓ DRY RUN: ' + result.message : '✓ ' + result.message, 'info');
        setTimeout(() => {
          document.getElementById('qrCode').value = '';
          document.getElementById('qty').value = '1';
          document.getElementById('issueTo').value = '';
          document.getElementById('purpose').value = '';
          document.getElementById('itemInfo').style.display = 'none';
          document.getElementById('submitBtn').disabled = true;
          lastScannedCode = '';
          startScanner();
        }, 2500);
      } else {
        showStatus('✗ ERROR: ' + result.error, 'error');
        document.getElementById('submitBtn').disabled = false;
      }
    }

    function onError(err) {
      document.getElementById('loader').style.display = 'none';
      showStatus('✗ ERROR: ' + (err.message || err), 'error');
      document.getElementById('submitBtn').disabled = false;
    }

    function showStatus(message, type) {
      const s = document.getElementById('statusMessage');
      s.className = 'status ' + type;
      s.innerHTML = message;
      s.style.display = 'block';
    }

    function startScanner() {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(function(stream) {
          stream.getTracks().forEach(t => t.stop());
          html5QrCode = new Html5Qrcode("reader");
          html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 250, height: 250 } },
            onScanSuccess
          ).catch(err => showStatus('Camera error: ' + err, 'error'));
        })
        .catch(function() {
          showStatus('📷 Camera permission denied. Please allow camera access in your browser settings and refresh.', 'error');
        });
    }

    window.onload = startScanner;
  </script>
</body>
</html>
